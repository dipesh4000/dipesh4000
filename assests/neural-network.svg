<svg width="180" height="100" viewBox="0 0 180 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Nodes -->
  <circle cx="30" cy="30" r="8" fill="#60a5fa">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="90" cy="20" r="8" fill="#60a5fa">
    <animate attributeName="r" values="8;11;8" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="35" r="8" fill="#60a5fa">
    <animate attributeName="r" values="8;9;8" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="70" r="8" fill="#60a5fa"/>
  <circle cx="110" cy="75" r="8" fill="#60a5fa">
    <animate attributeName="r" values="8;10;8" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Connections -->
  <line x1="30" y1="30" x2="90" y2="20" stroke="#3b82f6" stroke-width="2">
    <animate attributeName="stroke-dashoffset" values="0;20;0" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="90" y1="20" x2="150" y2="35" stroke="#3b82f6" stroke-width="2">
    <animate attributeName="stroke-dashoffset" values="0;25;0" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="30" y1="30" x2="50" y2="70" stroke="#3b82f6" stroke-width="2"/>
  <line x1="90" y1="20" x2="110" y2="75" stroke="#3b82f6" stroke-width="2">
    <animate attributeName="stroke-dashoffset" values="0;30;0" dur="3.5s" repeatCount="indefinite"/>
  </line>
</svg>
