<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title" role="img">
  <title>Waving Hand</title>
  <path d="M25 20 Q30 10 45 15 Q55 8 65 25" fill="#fbbf24" stroke="#d97706" stroke-width="12" stroke-linejoin="round"/>
  <!-- Fingers -->
  <path d="M32 22 L32 12" stroke="#d97706" stroke-width="8" stroke-linecap="round">
    <animate attributeName="d" values="M32 22 L32 12;M32 22 L32 10;M32 22 L32 12" dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M40 20 L40 10" stroke="#d97706" stroke-width="8" stroke-linecap="round">
    <animate attributeName="d" values="M40 20 L40 10;M40 20 L40 8;M40 20 L40 10" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <path d="M48 21 L48 12" stroke="#d97706" stroke-width="8" stroke-linecap="round">
    <animate attributeName="d" values="M48 21 L48 12;M48 21 L48 9;M48 21 L48 12" dur="1.3s" repeatCount="indefinite"/>
  </path>
</svg>
